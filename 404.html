<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — הדף לא נמצא | BA Beauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: #1a1a2e;
            color: #e0d6e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c8a2c8, #e8b4d0, #d4a0d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: none;
        }

        h1 {
            font-family: 'Heebo', sans-serif;
            font-size: 1.6rem;
            font-weight: 500;
            color: #e0d6e8;
            margin-bottom: 1.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b8a0c8;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .links a {
            color: #e0d6e8;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(200, 162, 200, 0.3);
            border-radius: 25px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background: rgba(200, 162, 200, 0.15);
            border-color: #c8a2c8;
            color: #fff;
        }

        .home-btn {
            display: inline-block;
            background: linear-gradient(135deg, #c8a2c8, #d4a0d4);
            color: #1a1a2e;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0.9rem 2.5rem;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(200, 162, 200, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(200, 162, 200, 0.45);
        }

        .sparkle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #c8a2c8;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <!-- Decorative sparkles -->
    <div class="sparkle" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
    <div class="sparkle" style="top: 25%; right: 20%; animation-delay: 1s;"></div>
    <div class="sparkle" style="bottom: 30%; left: 25%; animation-delay: 0.5s;"></div>
    <div class="sparkle" style="bottom: 15%; right: 15%; animation-delay: 1.5s;"></div>
    <div class="sparkle" style="top: 50%; left: 8%; animation-delay: 2s;"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>אופס — הדף הזה לא קיים</h1>
        <p class="subtitle">אולי התכוונת לאחד מאלה?</p>
        
        <div class="links">
            <a href="index.html">🏠 דף הבית</a>
            <a href="landing.html">💄 עיצוב איפור</a>
            <a href="portfolio.html">📸 תיק עבודות</a>
            <a href="questionnaire.html">📋 שאלון עיצוב</a>
            <a href="terms.html">📄 תנאי שימוש</a>
            <a href="privacy.html">🔒 מדיניות פרטיות</a>
        </div>

        <a href="index.html" class="home-btn">חזרה לדף הראשי ←</a>
    </div>
</body>
</html>
